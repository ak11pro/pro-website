<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Gen Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body {
  background:#0f0f0f;
  color:white;
  overflow-x:hidden;
}

/* Gradient background */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 20% 30%, #ff00cc, transparent),
              radial-gradient(circle at 80% 70%, #00f2ff, transparent);
  z-index:-1;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

nav h2 {
  font-weight:800;
}

nav a {
  margin-left:20px;
  text-decoration:none;
  color:white;
}

/* HERO */
.hero {
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-size:50px;
}

.hero span {
  background:linear-gradient(45deg,#ff00cc,#00f2ff);
  -webkit-background-clip:text;
  color:transparent;
}

/* Mouse reactive text */
.hero h1:hover {
  letter-spacing:3px;
  transition:0.4s;
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff00cc,#00f2ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.1);
}

/* BENTO GRID */
.bento {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:50px;
}

.box {
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  padding:30px;
  backdrop-filter:blur(15px);
  transition:0.4s;
}

.box:hover {
  transform:translateY(-10px) scale(1.05);
}

/* TEXTURE EFFECT */
.texture {
  background: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 2px,
    transparent 2px,
    transparent 4px
  );
}

/* FADE ANIMATION */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.show {
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<nav>
  <h2>NextGen</h2>
  <div>
    <a href="#">Home</a>
    <a href="#trends">Trends</a>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>I Build <span id="typing"></span></h1>
    <button class="btn">Hire Me</button>
  </div>
</section>

<!-- BENTO GRID -->
<section class="bento fade" id="trends">
  <div class="box texture">🔥 Dopamine Colors</div>
  <div class="box">🎮 Interactive UI</div>
  <div class="box">💎 Glass Design</div>
  <div class="box texture">📱 Responsive Layout</div>
</section>

<!-- AWARD INSPIRED -->
<section class="bento fade">
  <div class="box">💳 Jeton Style Animation</div>
  <div class="box">🌴 Mbau Visual Story</div>
  <div class="box">🔤 Elva Typography</div>
  <div class="box">🛍 Supima Minimal UI</div>
</section>

<script>
// Typing effect
const words=["Immersive Websites","3D UI","Future Designs"];
let i=0,j=0,word="",del=false;

function type(){
  word=words[i];
  document.getElementById("typing").innerHTML=word.substring(0,j);
  if(!del){ j++; if(j>word.length){del=true; setTimeout(type,1000); return;} }
  else{ j--; if(j<0){del=false;i=(i+1)%words.length;} }
  setTimeout(type, del?50:100);
}
type();

// Scroll animation
const els=document.querySelectorAll(".fade");
window.addEventListener("scroll",()=>{
  els.forEach(el=>{
    if(el.getBoundingClientRect().top<window.innerHeight-100){
      el.classList.add("show");
    }
  });
});
</script>

</body>
</html>
